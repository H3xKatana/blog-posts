apiVersion: v1
kind: ServiceAccount
metadata:
  name: backup-operator
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: backup-operator
rules:
- apiGroups: ["kubedojo.io"]
  resources: ["backups"]
  verbs: ["get", "list", "watch", "patch"]
- apiGroups: ["kubedojo.io"]
  resources: ["backups/status"]
  verbs: ["get", "patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: backup-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: backup-operator
subjects:
- kind: ServiceAccount
  name: backup-operator
  namespace: default
